            @page {
                size: A4;

    <style>
        @font-face {
            font-family: 'Lato';
            src: url("https://dietbox.azureedge.net/static/fonts/Lato-Regular.ttf");
            font-style: normal;
        }

        @font-face {
            font-family: "Lato";
            src: url("https://dietbox.azureedge.net/static/fonts/Lato-Bold.ttf");
            font-weight: bold;
        }

        body {
            font-family: 'Lato', sans-serif;
            -webkit-print-color-adjust: exact;
            margin: 0;
            padding: 8px;
            position: relative;
        }

        #page_to_print h1,
        #page_to_print h2,
        #page_to_print h3,
        #page_to_print p {
            margin: 0;
            margin-bottom: 0.4em;
        }

        #page_to_print h1 {
            font-size: 18px;
            margin-top: 0.5em;
        }

        #page_to_print h2,
        #page_to_print h3 {
            font-size: 16px;
        }

        #page_to_print .section h3 {
            text-align: center;
        }

        #page_to_print header {
            font-size: 16px;
            padding-bottom: 1.5em
        }

        #page_to_print .header {
            font-size: 13px;
        }

        #page_to_print header .logo {
            text-align: center;
            width: 30%;
        }

        #page_to_print header .logo img {
            max-height: 80px;
        }

        #page_to_print header .address {
            text-align: right;
        }

        #page_to_print header div:last-child {
            text-align: center;
        }

        #page_to_print table.header h3 {
            text-align: left;
        }

        #page_to_print footer small {
            color: #aaa;
            font-size: 10px;
        }

        #page_to_print table {
            width: 100%;
            border-collapse: collapse;
        }

        #page_to_print table td {
            vertical-align: top;
        }
        #page_to_print table th{
            color: #fff;
        }

        #page_to_print tr.table-line {
            background: #e1ffe1;
        }

        #page_to_print p {
            white-space: pre-line;
            text-align: justify;
        }

        #page_to_print .subtitle {
            margin-top: -0.5em;
            min-height: 0.4em;
            text-align: center;
        }

        #page_to_print .section {
            margin: 0;
            padding-top: 1.5em;
        }

        #page_to_print .section h3 {
            margin-bottom: 1.5em;
        }

        #page_to_print .section tr {
            line-height: 20px;
        }

        #content td:empty {
            padding: 0;
        }

        .page-watermark {
            position: relative;
            min-height: calc(100vh * var(--pages, 1));
        }

        .page-watermark::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://dietbox.azureedge.net/images/Estudante/watermark-pt-BR.png');
            background-size: contain;
            background-repeat: repeat-y;
            background-position: top center;
        }

        .footer__qrcode {
            display: inline-block;
            padding: 1rem 0;
        }

        .footer__qrcode .footer__image {
            display: inline-block;
        }

        .footer__qrcode p {
            font-size: 0.75rem;
            margin: 0;
            text-align: justify;
            line-height: 1.2;
        }

        .footer__qrcode .footer__text {
            display: inline-block;
            text-align: left;
            vertical-align: top;
            padding-top: .875rem;
            padding-left: 1rem;
            width: 225px;
        }
    </style>
